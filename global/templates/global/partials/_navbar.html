{% load static %}
<header class="navbar-wrapper">
  <nav class="navbar">
    <div class="navbar__content">
      <img class="navbar__logo"
           src="{% static 'global/img/logos/apollo-logo.svg' %}"
           alt="Logo Restaurante do Apollo" />
      <button class="menu-toggle" type="button">
        <span class="menu-toggle__icon">
          <span class="menu-toggle__bar"></span>
          <span class="menu-toggle__bar"></span>
          <span class="menu-toggle__bar"></span>
        </span>
      </button>
      <div id="primary-nav" class="navbar__menu">
        <ul class="navbar__list">
          <li>
            <a class="{% if request.resolver_match.url_name == 'home' and request.resolver_match.namespace == 'home' %}is-active{% endif %}"
               href="{% url "home:home" %}">Início</a>
          </li>
          <li>
            <a class="{% if request.resolver_match.namespace == 'blog' %}is-active{% endif %}"
               href="{% url "home:blog" %}">Blog</a>
          </li>
          <li>
            <a class="{% if request.resolver_match.url_name == 'about_us' and request.resolver_match.namespace == 'home' %}is-active{% endif %}"
               href="{% url "home:about_us" %}">Sobre nós</a>
          </li>
        </ul>
        <a class="button button--nav" href="#">Fazer reserva</a>
      </div>
    </div>
  </nav>
</header>
